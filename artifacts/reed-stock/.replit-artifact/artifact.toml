kind = "web"
previewPath = "/"
title = "Reed Stock Management"
version = "1.0.0"
id = "artifacts/reed-stock"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18598

[services.development]
run = "pnpm --filter @workspace/reed-stock run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/reed-stock", "run", "build" ]
publicDir = "artifacts/reed-stock/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18598"
BASE_PATH = "/"
